spring.application.name=analytic-service

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer

# ---- Database (its own analytics DB) ----
spring.datasource.url=jdbc:postgresql://localhost:5433/analytic-service-db                                                                         
spring.datasource.username=admin_user                                                                                                              
spring.datasource.password=password                                                                                                                

# ---- Flyway builds the schema; Hibernate only validates ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate

# see the SQL Hibernate runs (learning aid, like patient-service)
spring.jpa.show-sql=true 