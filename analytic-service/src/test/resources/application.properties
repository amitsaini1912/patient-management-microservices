# Test config: run against in-memory H2 (PostgreSQL compatibility mode) so CI
# needs no real Postgres. Flyway still builds the schema from db/migration,
# and Hibernate validates the entities against it — same flow as production.
spring.datasource.url=jdbc:h2:mem:analyticdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate

# No Kafka broker in CI: don't start the @KafkaListener during the test.
spring.kafka.listener.auto-startup=false