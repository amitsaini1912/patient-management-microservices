spring.kafka.bootstrap-servers=kafka:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.ByteArraySerializer

# Overridden in Docker by SPRING_DATA_REDIS_HOST=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# --- temporary, for learning: lets us SEE the cache working ---
spring.jpa.show-sql=true
logging.level.org.springframework.cache=TRACE

# ---- Resilience4j Circuit Breaker: billingService ----
resilience4j.circuitbreaker.instances.billingService.register-health-indicator=true                                                                
resilience4j.circuitbreaker.instances.billingService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.billingService.sliding-window-size=10                                                                        
resilience4j.circuitbreaker.instances.billingService.minimum-number-of-calls=5                                                                     
resilience4j.circuitbreaker.instances.billingService.failure-rate-threshold=50                                                                     
resilience4j.circuitbreaker.instances.billingService.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.billingService.permitted-number-of-calls-in-half-open-state=3                                                
resilience4j.circuitbreaker.instances.billingService.automatic-transition-from-open-to-half-open-enabled=true                                      

# ---- Actuator: expose health + circuit breaker state + prometheus ----
management.endpoints.web.exposure.include=health,circuitbreakers,prometheus,metrics                                                                                  
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# Tag every metric with the service name (future-proofs for multi-service later)
management.metrics.tags.application=${spring.application.name}


# ---- Flyway: schema is now built by migration files, not Hibernate ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never
spring.flyway.baseline-on-migrate=true

server.port=4000
logging.level.root=info